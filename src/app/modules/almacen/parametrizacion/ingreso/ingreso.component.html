<div class="row">
    <div class="col-lg-12 col-md-12 col-sm-12">
        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12">
                @if(!showForm){
                <div class="row">
                    <div class="col-lg-2 col-md-2 col-sm-12 text-end">
                        <form [formGroup]="formGestion">
                            <mat-form-field class="w-100">
                                <mat-label>Gestión</mat-label>
                                <mat-icon matIconPrefix>calendar_today</mat-icon>
                                <mat-select formControlName="gestion">
                                    @for(g of dataGestiones; track g){
                                        <mat-option [value]="g">{{g}}</mat-option>
                                    }
                                    @if(formGestion.controls['gestion']?.hasError('required')){
                                        <mat-error>Este campo es requerido</mat-error>
                                    }
                                </mat-select>
                            </mat-form-field>
                        </form>
                    </div>
                    <div class="col-lg-6 col-md-6 col-sm-12 py-3">
                        <span class="fw-lighter fs-5"><i class="ti ti-table-import fs-4"></i> Bandeja de Ingreso de Materiales</span>
                    </div>
                    <div class="col-lg-4 col-md-4 col-sm-12 text-end">
                        <button class="btn btn-primary btn-round mb-3 mt-2" matTooltip="Nuevo Ingreso" (click)="onActionNuevo()">
                            <i class="ti ti-plus"></i> Nuevo Ingreso
                        </button>
                    </div>
                </div>
                <hr class="separator"/>
                <ag-grid-angular style="width: 100%; height: 600px;"
                    class="ag-theme-material"
                    [gridOptions]="gridOptions"
                    [advancedFilterModel]=""
                    [columnDefs]="columnDefs"
                    [rowData]="dataIngresos"
                    [pagination]="true"
                    [localeText]="localEs"
                    [rowSelection]="'single'"
                    [paginationPageSize]="paginationPageSize"
                    [paginationPageSizeSelector]="paginationPageSizeSelector"
                    [paginationNumberFormatter]="paginationNumberFormatter"
                    (selectionChanged)="onSelectionChangedIngreso($event)"
                    (gridReady)="onGridReadyIngreso($event)">
                </ag-grid-angular>
                } 
            </div>

        </div>
    </div>
</div>
